[build.env]
passthrough = [
  "ACOUSTICS_LOG",
  "CMAKE_POLICY_VERSION_MINIMUM",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update",
  "apt-get install --assume-yes --no-install-recommends libasound2-dev:$CROSS_DEB_ARCH protobuf-compiler",
]
