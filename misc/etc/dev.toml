workspace_root = "misc/workspace"

[mic.mic]
kind = "fixed"
id = "mock:0"

[mic.channel]
kind = "fixed"
channel = 0

[inference]
hop_samples = 22050
top_k = 3

[training_defaults]
epochs = 32
batch_size = 16
learning_rate_e6 = 100

[stream]
uds_path = "misc/share/acousticsd.sock"
uds_mode = 438
tcp_bind = "127.0.0.1:8787"
broadcast_capacity = 64
