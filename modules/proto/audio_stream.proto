syntax = "proto3";

package acoustics;

// AudioFrame -- one Opus-encoded packet emitted by the Opus encoder
// pipeline (44.1 k -> 48 k -> libopus, 20 ms mono frames).
//
// Field numbers 1-15 use 1-byte tags in proto3 wire format; the
// daemon reserves these for the hot fields.  Additive fields go to
// 16+ (2-byte tags); receivers ignore unknown tags per proto3
// semantics.
//
// Additive scalars are `optional` so receivers can distinguish "field
// absent" from "field zero" (proto3's default-suppression conflates the
// two for non-`optional` scalars).
//
// `t_us_capture_monotonic` and `t_us_publish_unix` disambiguate which
// clock domain the timestamp belongs to.  No `reserved` block: with
// no third-party peers, wire-breaking renumbers ship as fresh-start
// replacements.
//   * `t_us_capture_monotonic` -- microseconds since process boot
//     (CLOCK_MONOTONIC, per-process).  Maps to
//     `common::time::CaptureTime`.  Sampled at the audio producer's
//     `Writer::push` callback via a `BufferTimingAnchor` and projected
//     to the FIRST 44.1 kHz sample of the encoded packet's input
//     chunk (window-start convention).  Cross-frame synchronisation
//     against `InferenceFrame.t_us_capture_monotonic` is therefore
//     wall-aligned to within ~1 ms (one resampler chunk + one mic
//     period), letting clients pair audio + inference frames whose
//     `t_us_capture_monotonic` values agree.
//   * `t_us_publish_unix` -- microseconds since the Unix epoch
//     (wall-clock, cross-process).  Maps to `common::time::WallTime`.
//     Sampled at packet emit time; intended for cross-process
//     correlation, not audio synchronisation (use
//     `t_us_capture_monotonic` for that).
//
// `opus_payload = 3` was wrapped in `oneof codec` so a future PCM/FLAC
// second codec is additive, not breaking.  The bare `opus_payload`
// field is removed; the new `codec.opus = 10` slot carries the same
// bytes.
message AudioFrame {
  uint64 seq = 1;            // monotonic per process; restarts on daemon reboot
  optional uint64 t_us_capture_monotonic = 2;  // CLOCK_MONOTONIC us, per-process
  optional uint64 t_us_publish_unix      = 6;  // wall-clock us since Unix epoch
  optional uint32 sample_rate            = 4;  // 48000
  optional uint32 frame_duration_ms      = 5;  // 20

  // Codec discriminator.  At-most-one variant set per frame; receivers
  // that see an unknown variant tag MAY drop the frame (proto3 unknown-
  // field semantics).
  oneof codec {
    bytes opus    = 10;  // libopus, <= 4000 B per Opus spec
    bytes pcm_s16 = 11;  // future
    bytes flac    = 12;  // future
  }
}
